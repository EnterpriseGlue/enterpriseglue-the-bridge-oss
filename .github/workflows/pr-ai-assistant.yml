name: PR AI Assistant

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-ai-assistant-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  suggest-and-apply:
    if: ${{ github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate AI suggestions (title + release label + impact)
        id: suggest
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const releaseLabels = [
              'release:breaking',
              'release:feature',
              'release:fix',
              'release:security',
              'release:docs',
              'release:internal',
              'release:deprecation',
              'release:compat'
            ];

            const normalizeTitleSummary = (title) => {
              if (!title) return 'update changes';
              return title
                .replace(/^[a-z]+\([^)]*\)!?:\s*/i, '')
                .replace(/^[a-z]+!?:\s*/i, '')
                .trim()
                .slice(0, 90) || 'update changes';
            };

            const inferScope = (paths) => {
              if (paths.some((p) => p.startsWith('backend/'))) return 'backend';
              if (paths.some((p) => p.startsWith('frontend/'))) return 'frontend';
              if (paths.some((p) => p.startsWith('.github/') || p.startsWith('scripts/') || p.startsWith('docker-compose'))) return 'infra';
              if (paths.some((p) => p.startsWith('docs/') || p.endsWith('.md'))) return 'docs';
              return 'core';
            };

            const analyzeChangeScope = (paths) => {
              const bucketForPath = (path) => {
                if (path.startsWith('.github/workflows/')) return 'ci';
                if (path.startsWith('.github/')) return 'github';
                if (path.startsWith('backend/')) return 'backend';
                if (path.startsWith('frontend/')) return 'frontend';
                if (path.startsWith('docs/') || path.endsWith('.md')) return 'docs';
                if (path.startsWith('scripts/') || path.startsWith('docker-compose')) return 'ops';
                return 'core';
              };

              const counts = new Map();
              for (const path of paths) {
                const bucket = bucketForPath(path);
                counts.set(bucket, (counts.get(bucket) || 0) + 1);
              }

              const ordered = [...counts.entries()].sort((a, b) => b[1] - a[1]);
              const scopeSummary = ordered.slice(0, 3).map(([name, count]) => `${name} (${count})`).join(', ') || 'core';
              const keyFiles = paths.slice(0, 5).join(', ') || 'n/a';

              const risks = [];
              if (counts.has('ci') || counts.has('github')) risks.push('workflow/release automation');
              if (counts.has('backend')) risks.push('runtime behavior');
              if (counts.has('frontend')) risks.push('UI behavior');
              if (counts.has('ops')) risks.push('deployment/config');
              const riskSummary = risks.join('; ') || 'low risk';

              return { scopeSummary, riskSummary, keyFiles };
            };

            const buildFallbackSummary = (title, paths) => {
              const scope = inferScope(paths);
              const summaryBase = normalizeTitleSummary(title);
              const topBuckets = [...new Set(paths.map((path) => {
                if (path.startsWith('.github/workflows/')) return 'CI/workflows';
                if (path.startsWith('.github/')) return 'GitHub automation';
                if (path.startsWith('backend/')) return 'backend';
                if (path.startsWith('frontend/')) return 'frontend';
                if (path.startsWith('docs/') || path.endsWith('.md')) return 'documentation';
                return 'core';
              }))].slice(0, 3);

              const areaSummary = topBuckets.length > 0 ? topBuckets.join(', ') : scope;
              return [
                `- ${summaryBase.charAt(0).toUpperCase()}${summaryBase.slice(1)}.`,
                `- Main areas touched: ${areaSummary}.`,
              ].join('\n');
            };

            const normalizeSummary = (summaryText, fallbackText) => {
              const raw = String(summaryText || '').replace(/\\n/g, '\n').trim();
              if (!raw) return fallbackText;

              const lines = raw
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
                .slice(0, 5)
                .map((line) => line.startsWith('- ') ? line : `- ${line.replace(/^[-*]\s*/, '')}`);

              return lines.length > 0 ? lines.join('\n') : fallbackText;
            };

            const deterministicFallback = (title, body, paths) => {
              const lowerTitle = String(title || '').toLowerCase();
              const lowerBody = String(body || '').toLowerCase();
              const docsOnly = paths.length > 0 && paths.every((p) => p.startsWith('docs/') || p.endsWith('.md'));
              const breaking = /breaking|!:/i.test(title || '') || /breaking\s+change/i.test(body || '');
              const security = /security|vuln|cve/i.test(lowerTitle) || /security|vuln|cve/i.test(lowerBody);
              const feature = /feat|feature|add|introduce|implement/i.test(lowerTitle);
              const fix = /fix|bug|regress|hotfix/i.test(lowerTitle);

              let releaseLabel = 'release:internal';
              let impact = 'patch';
              let type = 'chore';

              if (breaking) {
                releaseLabel = 'release:breaking';
                impact = 'major';
                type = 'feat';
              } else if (security) {
                releaseLabel = 'release:security';
                impact = 'patch';
                type = 'fix';
              } else if (docsOnly) {
                releaseLabel = 'release:docs';
                impact = 'patch';
                type = 'docs';
              } else if (feature) {
                releaseLabel = 'release:feature';
                impact = 'minor';
                type = 'feat';
              } else if (fix) {
                releaseLabel = 'release:fix';
                impact = 'patch';
                type = 'fix';
              }

              const scope = inferScope(paths);
              const fallbackSummary = (() => {
                if (docsOnly) return 'refresh documentation';
                if (breaking) return `introduce ${scope} breaking changes`;
                if (security) return `harden ${scope} security`; 
                if (feature) return `add ${scope} capability`;
                if (fix) return `resolve ${scope} issue`;
                return `refine ${scope} behavior`;
              })();
              const summary = normalizeTitleSummary(title) === 'update changes'
                ? fallbackSummary
                : normalizeTitleSummary(title);
              const bang = breaking ? '!' : '';
              const suggestedTitle = `${type}(${scope})${bang}: ${summary}`;
              const confidence = breaking
                ? 0.92
                : security
                  ? 0.84
                  : docsOnly
                    ? 0.86
                    : (feature || fix)
                      ? 0.74
                      : 0.62;

              return {
                title: suggestedTitle,
                release_label: releaseLabel,
                impact,
                confidence,
                reasoning: 'Fallback inference (keyword + file-path heuristic) was used.',
                summary: buildFallbackSummary(title, paths),
              };
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedPaths = files.map((f) => f.filename);
            const fileSummary = files.slice(0, 80).map((f) => {
              const status = f.status;
              return `${f.filename} (${status}, +${f.additions}/-${f.deletions})`;
            }).join('\n');
            const scopeInsight = analyzeChangeScope(changedPaths);

            if (!process.env.OPENAI_API_KEY) {
              core.notice('OPENAI_API_KEY is not configured. Using deterministic fallback suggestions.');
              const fallback = deterministicFallback(pr.title, pr.body || '', changedPaths);
              core.setOutput('status', 'fallback');
              core.setOutput('suggested_title', fallback.title);
              core.setOutput('release_label', fallback.release_label);
              core.setOutput('impact', fallback.impact);
              core.setOutput('confidence', fallback.confidence.toFixed(2));
              core.setOutput('reasoning', fallback.reasoning);
              core.setOutput('summary', fallback.summary);
              core.setOutput('scope_summary', scopeInsight.scopeSummary);
              core.setOutput('risk_summary', scopeInsight.riskSummary);
              core.setOutput('key_files', scopeInsight.keyFiles);
              return;
            }

            const systemPrompt = [
              'You are a release engineering assistant.',
              'Return ONLY valid JSON with keys: title, release_label, impact, confidence, reasoning, summary.',
              'title must follow conventional format: type(scope): summary.',
              'summary must be 2-4 concise bullet points for PR template use.',
              'Use a human, natural tone in the summary (short verb + object).',
              'Avoid robotic fillers like "update changes", "misc", or "various fixes".',
              'Prefer concrete verbs (add, refine, resolve, streamline, harden).',
              'Allowed release_label values: ' + releaseLabels.join(', ') + '.',
              'Allowed impact values: patch, minor, major.',
              'confidence must be a number between 0 and 1.',
              'Use major only for clearly breaking changes.',
              'Keep summary concise (max 90 chars).',
            ].join(' ');

            const userPrompt = [
              `PR title: ${pr.title}`,
              `PR body:\n${String(pr.body || '').slice(0, 4000)}`,
              `Changed files (${changedPaths.length}):\n${fileSummary}`,
              'Decide best title, release label, and semantic impact.'
            ].join('\n\n');

            let parsed;
            let suggestionSource = 'ai';
            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL || 'gpt-4o-mini',
                  temperature: 0.2,
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt },
                  ],
                  response_format: { type: 'json_object' },
                }),
              });

              if (!response.ok) {
                const err = await response.text();
                throw new Error(`OpenAI API error ${response.status}: ${err}`);
              }

              const payload = await response.json();
              const content = payload?.choices?.[0]?.message?.content;
              if (!content) throw new Error('OpenAI returned empty content');
              parsed = JSON.parse(content);
            } catch (error) {
              core.warning(`AI suggestion failed: ${error.message}`);
              parsed = deterministicFallback(pr.title, pr.body || '', changedPaths);
              parsed.reasoning = `AI request failed; ${parsed.reasoning}`;
              suggestionSource = 'fallback';
            }

            const fallback = deterministicFallback(pr.title, pr.body || '', changedPaths);
            const safeTitle = typeof parsed.title === 'string' && parsed.title.trim() ? parsed.title.trim() : fallback.title;
            let safeLabel = releaseLabels.includes(parsed.release_label) ? parsed.release_label : fallback.release_label;
            const safeImpact = ['patch', 'minor', 'major'].includes(parsed.impact) ? parsed.impact : fallback.impact;
            const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
            const parsedConfidence = Number(parsed.confidence);
            const safeConfidence = Number.isFinite(parsedConfidence)
              ? clamp(parsedConfidence, 0, 1)
              : fallback.confidence;
            const safeReasoning = typeof parsed.reasoning === 'string' && parsed.reasoning.trim()
              ? parsed.reasoning.trim().slice(0, 600)
              : fallback.reasoning;
            const safeSummary = normalizeSummary(parsed.summary, fallback.summary);

            const allowedLabelsByType = {
              feat: new Set(['release:feature', 'release:breaking', 'release:security', 'release:compat']),
              fix: new Set(['release:fix', 'release:breaking', 'release:security', 'release:compat']),
              docs: new Set(['release:docs', 'release:internal']),
              perf: new Set(['release:feature', 'release:fix', 'release:internal', 'release:breaking']),
              refactor: new Set(['release:internal', 'release:compat', 'release:deprecation', 'release:breaking']),
              test: new Set(['release:internal']),
              chore: new Set(['release:internal']),
              ci: new Set(['release:internal']),
              build: new Set(['release:internal']),
              style: new Set(['release:internal']),
              revert: new Set(['release:fix', 'release:internal', 'release:breaking'])
            };
            const preferredTypeByLabel = {
              'release:breaking': 'feat',
              'release:feature': 'feat',
              'release:fix': 'fix',
              'release:security': 'fix',
              'release:docs': 'docs',
              'release:internal': 'chore',
              'release:deprecation': 'refactor',
              'release:compat': 'fix'
            };
            const coerceTitleForReleaseLabel = (title, releaseLabel) => {
              const fallbackScope = `(${inferScope(changedPaths)})`;
              const parsedTitle = String(title || '').trim().match(/^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s(.+)$/i);

              if (!parsedTitle) {
                const targetType = preferredTypeByLabel[releaseLabel] || 'chore';
                const summary = normalizeTitleSummary(title);
                const bang = releaseLabel === 'release:breaking' ? '!' : '';
                return `${targetType}${fallbackScope}${bang}: ${summary}`;
              }

              const [, rawType, rawScope = '', rawBang = '', rawSummary = 'update changes'] = parsedTitle;
              const currentType = String(rawType || '').toLowerCase();
              const summary = String(rawSummary || 'update changes').trim();
              const allowedForCurrentType = allowedLabelsByType[currentType];
              if (allowedForCurrentType && allowedForCurrentType.has(releaseLabel)) {
                return `${currentType}${rawScope}${rawBang}: ${summary}`;
              }

              const targetType = preferredTypeByLabel[releaseLabel] || currentType;
              const bang = releaseLabel === 'release:breaking' ? '!' : '';
              return `${targetType}${rawScope || fallbackScope}${bang}: ${summary}`;
            };
            const preliminaryTitle = coerceTitleForReleaseLabel(safeTitle, safeLabel);
            const preliminaryTitleMatch = String(preliminaryTitle || '').trim().match(/^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s.+$/i);
            const preliminaryType = preliminaryTitleMatch ? preliminaryTitleMatch[1].toLowerCase() : '';
            const preliminaryIsBreaking = Boolean(preliminaryTitleMatch && preliminaryTitleMatch[3]);
            const internalOnlyTypes = new Set(['ci', 'chore', 'build', 'test']);
            if (!preliminaryIsBreaking && internalOnlyTypes.has(preliminaryType)) {
              safeLabel = 'release:internal';
            }

            const compatibleTitle = coerceTitleForReleaseLabel(safeTitle, safeLabel);

            core.setOutput('status', suggestionSource);
            core.setOutput('suggested_title', compatibleTitle);
            core.setOutput('release_label', safeLabel);
            core.setOutput('impact', safeImpact);
            core.setOutput('confidence', safeConfidence.toFixed(2));
            core.setOutput('reasoning', safeReasoning);
            core.setOutput('summary', safeSummary);
            core.setOutput('scope_summary', scopeInsight.scopeSummary);
            core.setOutput('risk_summary', scopeInsight.riskSummary);
            core.setOutput('key_files', scopeInsight.keyFiles);

      - name: Upsert PR assistant comment
        uses: actions/github-script@v7
        env:
          SUGGESTED_TITLE: ${{ steps.suggest.outputs.suggested_title }}
          RELEASE_LABEL: ${{ steps.suggest.outputs.release_label }}
          IMPACT: ${{ steps.suggest.outputs.impact }}
          CONFIDENCE: ${{ steps.suggest.outputs.confidence }}
          REASONING: ${{ steps.suggest.outputs.reasoning }}
          SUMMARY: ${{ steps.suggest.outputs.summary }}
          SCOPE_SUMMARY: ${{ steps.suggest.outputs.scope_summary }}
          RISK_SUMMARY: ${{ steps.suggest.outputs.risk_summary }}
          KEY_FILES: ${{ steps.suggest.outputs.key_files }}
          STATUS: ${{ steps.suggest.outputs.status }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- ai-pr-assistant -->';
            const status = String(process.env.STATUS || '').toLowerCase();
            const suggestedTitle = process.env.SUGGESTED_TITLE || 'n/a';
            const suggestedReleaseLabel = process.env.RELEASE_LABEL || 'n/a';

            const { data: freshPR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const currentLabels = (freshPR.labels || []).map((l) => l.name);
            const releaseLabelPriority = [
              'release:breaking',
              'release:security',
              'release:feature',
              'release:fix',
              'release:deprecation',
              'release:compat',
              'release:docs',
              'release:internal'
            ];
            const currentReleaseLabel = releaseLabelPriority.find((label) => currentLabels.includes(label)) || '';

            const hasActionableDiff =
              (suggestedTitle && suggestedTitle !== freshPR.title) ||
              (suggestedReleaseLabel && suggestedReleaseLabel !== 'n/a' && suggestedReleaseLabel !== currentReleaseLabel);

            const body = [
              marker,
              '### PR Assistant',
              '',
              `- Suggested title: \`${suggestedTitle}\``,
              `- Suggested release label: \`${suggestedReleaseLabel}\``,
              `- Suggested release impact: \`${process.env.IMPACT || 'n/a'}\``,
              `- Confidence: \`${process.env.CONFIDENCE || 'n/a'}\``,
              '',
              'Suggested PR summary (copy into PR template):',
              `${process.env.SUMMARY || '- n/a'}`,
              '',
              'Scope snapshot:',
              `- Areas: \`${process.env.SCOPE_SUMMARY || 'n/a'}\``,
              `- Risk focus: \`${process.env.RISK_SUMMARY || 'n/a'}\``,
              `- Key files: \`${process.env.KEY_FILES || 'n/a'}\``,
              '',
              `Reasoning: ${process.env.REASONING || 'n/a'}`,
              '',
              'Auto-apply mode:',
              '- Release label baseline is auto-managed by this workflow.',
              '- Add label `ai:apply` to this PR, or set repo variable `AI_PR_AUTOFIX_ENABLED=true` to also auto-update the PR title.'
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (status !== 'fallback' && !hasActionableDiff) {
              core.notice('Skipping PR assistant comment update: no actionable title/label deltas.');
              return;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

      - name: Auto-apply title and label (optional)
        uses: actions/github-script@v7
        env:
          AUTOFIX_ENABLED: ${{ vars.AI_PR_AUTOFIX_ENABLED || 'false' }}
          AUTOFIX_ALLOW_FORKS: ${{ vars.AI_PR_AUTOFIX_ALLOW_FORKS || 'false' }}
          SUGGESTED_TITLE: ${{ steps.suggest.outputs.suggested_title }}
          RELEASE_LABEL: ${{ steps.suggest.outputs.release_label }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const { data: freshPR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const labels = (freshPR.labels || []).map((l) => l.name);
            const hasApplyLabel = labels.includes('ai:apply');
            const autofixEnabled = String(process.env.AUTOFIX_ENABLED || 'false').toLowerCase() === 'true';
            const shouldApplyTitle = autofixEnabled || hasApplyLabel;
            const allowForkAutofix = String(process.env.AUTOFIX_ALLOW_FORKS || 'false').toLowerCase() === 'true';

            const isFork = Boolean(freshPR.head?.repo?.fork);
            const trustedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const authorAssociation = String(freshPR.author_association || '').toUpperCase();

            const releaseLabel = process.env.RELEASE_LABEL;
            const suggestedTitle = process.env.SUGGESTED_TITLE;
            const allowedReleaseLabels = new Set([
              'release:breaking',
              'release:feature',
              'release:fix',
              'release:security',
              'release:docs',
              'release:internal',
              'release:deprecation',
              'release:compat'
            ]);
            const releaseLabelDefaults = {
              'release:breaking': { color: 'B60205', description: 'Breaking change' },
              'release:feature': { color: '0E8A16', description: 'Feature change' },
              'release:fix': { color: '1D76DB', description: 'Bug fix change' },
              'release:security': { color: 'D93F0B', description: 'Security change' },
              'release:docs': { color: '5319E7', description: 'Documentation change' },
              'release:internal': { color: '6B7280', description: 'Internal/infra change' },
              'release:deprecation': { color: 'FBCA04', description: 'Deprecation change' },
              'release:compat': { color: '0E8A16', description: 'Compatibility change' }
            };
            const ensureLabelExists = async (name) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                const defaults = releaseLabelDefaults[name] || { color: '6B7280', description: 'Release label' };
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: defaults.color,
                  description: defaults.description,
                });
              }
            };
            const existingReleaseLabels = labels.filter((label) => allowedReleaseLabels.has(label));
            const releaseLabelPriority = [
              'release:breaking',
              'release:security',
              'release:feature',
              'release:fix',
              'release:deprecation',
              'release:compat',
              'release:docs',
              'release:internal'
            ];
            let effectiveReleaseLabel = releaseLabelPriority.find((label) => existingReleaseLabels.includes(label)) || releaseLabel;

            const titleMatch = String(freshPR.title || '').match(/^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s.+$/i);
            const titleType = titleMatch ? titleMatch[1].toLowerCase() : '';
            const titleIsBreaking = Boolean(titleMatch && titleMatch[3]) || /breaking\s+change/i.test(String(freshPR.body || ''));
            const internalOnlyTypes = new Set(['ci', 'chore', 'build', 'test']);

            let targetReleaseLabel = releaseLabel && allowedReleaseLabels.has(releaseLabel)
              ? releaseLabel
              : (releaseLabelPriority.find((label) => existingReleaseLabels.includes(label)) || 'release:internal');

            if (titleIsBreaking) {
              targetReleaseLabel = 'release:breaking';
            } else if (internalOnlyTypes.has(titleType)) {
              targetReleaseLabel = 'release:internal';
            }

            await ensureLabelExists(targetReleaseLabel);
            for (const label of existingReleaseLabels) {
              if (label === targetReleaseLabel) continue;
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label,
              });
            }

            if (!existingReleaseLabels.includes(targetReleaseLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [targetReleaseLabel],
              });
              core.notice(`Set release label: ${targetReleaseLabel}`);
            }

            effectiveReleaseLabel = targetReleaseLabel;

            const allowedLabelsByType = {
              feat: new Set(['release:feature', 'release:breaking', 'release:security', 'release:compat']),
              fix: new Set(['release:fix', 'release:breaking', 'release:security', 'release:compat']),
              docs: new Set(['release:docs', 'release:internal']),
              perf: new Set(['release:feature', 'release:fix', 'release:internal', 'release:breaking']),
              refactor: new Set(['release:internal', 'release:compat', 'release:deprecation', 'release:breaking']),
              test: new Set(['release:internal']),
              chore: new Set(['release:internal']),
              ci: new Set(['release:internal']),
              build: new Set(['release:internal']),
              style: new Set(['release:internal']),
              revert: new Set(['release:fix', 'release:internal', 'release:breaking'])
            };
            const preferredTypeByLabel = {
              'release:breaking': 'feat',
              'release:feature': 'feat',
              'release:fix': 'fix',
              'release:security': 'fix',
              'release:docs': 'docs',
              'release:internal': 'chore',
              'release:deprecation': 'refactor',
              'release:compat': 'fix'
            };
            const normalizeTitleSummary = (title) => {
              if (!title) return 'update changes';
              return String(title)
                .replace(/^[a-z]+\([^)]*\)!?:\s*/i, '')
                .replace(/^[a-z]+!?:\s*/i, '')
                .trim()
                .slice(0, 90) || 'update changes';
            };
            const coerceTitleForReleaseLabel = (title, label) => {
              if (!label) return title;

              const fallbackScope = '(core)';
              const parsedTitle = String(title || '').trim().match(/^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s(.+)$/i);
              if (!parsedTitle) {
                const targetType = preferredTypeByLabel[label] || 'chore';
                const summary = normalizeTitleSummary(title);
                const bang = label === 'release:breaking' ? '!' : '';
                return `${targetType}${fallbackScope}${bang}: ${summary}`;
              }

              const [, rawType, rawScope = '', rawBang = '', rawSummary = 'update changes'] = parsedTitle;
              const currentType = String(rawType || '').toLowerCase();
              const summary = String(rawSummary || 'update changes').trim();
              const allowedForCurrentType = allowedLabelsByType[currentType];
              if (allowedForCurrentType && allowedForCurrentType.has(label)) {
                return `${currentType}${rawScope}${rawBang}: ${summary}`;
              }

              const targetType = preferredTypeByLabel[label] || currentType;
              const bang = label === 'release:breaking' ? '!' : '';
              const scope = rawScope || '(core)';
              return `${targetType}${scope}${bang}: ${summary}`;
            };

            if (!shouldApplyTitle) {
              core.notice('Title auto-apply disabled. Advisory mode for title updates.');
              return;
            }

            if (isFork && !allowForkAutofix) {
              core.notice('Title auto-apply blocked: PR comes from a fork (set AI_PR_AUTOFIX_ALLOW_FORKS=true to override).');
              return;
            }

            if (!trustedAssociations.has(authorAssociation)) {
              core.notice(`Title auto-apply blocked: untrusted author association (${authorAssociation || 'UNKNOWN'}).`);
              return;
            }

            const desiredTitle = coerceTitleForReleaseLabel(suggestedTitle || freshPR.title, effectiveReleaseLabel);
            if (desiredTitle && desiredTitle !== freshPR.title) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title: desiredTitle,
              });
              core.notice(`Updated PR title to: ${desiredTitle}`);
            }

name: CI

on:
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_tests: ${{ steps.detect.outputs.run_tests }}
      current_sha: ${{ steps.detect.outputs.current_sha }}
      run_postgres: ${{ steps.detect.outputs.run_postgres }}
      run_oracle: ${{ steps.detect.outputs.run_oracle }}
      run_smoke: ${{ steps.detect.outputs.run_smoke }}
      changed_files_count: ${{ steps.detect.outputs.changed_files_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changes since last nightly run
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          emit_all_true() {
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_postgres=true" >> "$GITHUB_OUTPUT"
            echo "run_oracle=true" >> "$GITHUB_OUTPUT"
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          }

          CURRENT_SHA=$(git rev-parse HEAD)
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            emit_all_true
            echo "changed_files_count=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA:-$CURRENT_SHA}"
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
            CHANGED_COUNT="$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
            echo "changed_files_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"

            if [ -z "$CHANGED_FILES" ]; then
              emit_all_true
              exit 0
            fi

            echo "run_tests=true" >> "$GITHUB_OUTPUT"

            backend_changed=false
            frontend_changed=false
            infra_changed=false
            db_changed=false
            docs_only=true

            if grep -Eq '^(backend/|packages/contracts/|package\.json|package-lock\.json)' <<< "$CHANGED_FILES"; then backend_changed=true; fi
            if grep -Eq '^(frontend/|packages/contracts/|package\.json|package-lock\.json)' <<< "$CHANGED_FILES"; then frontend_changed=true; fi
            if grep -Eq '^(infra/docker/|infra/kubernetes/|scripts/smoke-images-local\.sh|backend/Dockerfile\.prod|frontend/Dockerfile\.prod|\.github/workflows/(ci|docker-images)\.yml)' <<< "$CHANGED_FILES"; then infra_changed=true; fi
            if grep -Eq '^backend/src/shared/db/|^backend/src/shared/config/|^backend/src/modules/.*/.*(db|migration)|^backend/.+migration' <<< "$CHANGED_FILES"; then db_changed=true; fi
            if grep -Evq '^(docs/|README\.md|CHANGELOG\.md|\.github/.*\.md$)' <<< "$CHANGED_FILES"; then docs_only=false; fi

            run_postgres=false
            run_oracle=false
            run_smoke=false

            if [ "$docs_only" = false ]; then
              if [ "$backend_changed" = true ] || [ "$frontend_changed" = true ] || [ "$infra_changed" = true ]; then
                run_postgres=true
              fi
              if [ "$backend_changed" = true ] || [ "$db_changed" = true ] || [ "$infra_changed" = true ]; then
                run_oracle=true
              fi
              if [ "$backend_changed" = true ] || [ "$frontend_changed" = true ] || [ "$infra_changed" = true ] || [ "$db_changed" = true ]; then
                run_smoke=true
              fi
            fi

            echo "run_postgres=$run_postgres" >> "$GITHUB_OUTPUT"
            echo "run_oracle=$run_oracle" >> "$GITHUB_OUTPUT"
            echo "run_smoke=$run_smoke" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit_all_true
            echo "changed_files_count=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SHA=$(cat .sync/ci-main.sha 2>/dev/null || echo "")
          if [ "$CURRENT_SHA" = "$LAST_SHA" ]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "run_postgres=false" >> "$GITHUB_OUTPUT"
            echo "run_oracle=false" >> "$GITHUB_OUTPUT"
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
          else
            emit_all_true
            echo "changed_files_count=since-last-nightly" >> "$GITHUB_OUTPUT"
          fi

  compose-render:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.run_tests == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate compose render for dev DB overlays
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          ENV_EXAMPLES_DIR="infra/docker/env/examples"
          cp "$ENV_EXAMPLES_DIR/docker.postgres.env.example" .env.docker
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.postgres.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.postgres.env.example" -f "$COMPOSE_DIR/docker-compose.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.mysql.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.mysql.env.example" -f "$COMPOSE_DIR/docker-compose.yml" -f "$COMPOSE_DIR/docker-compose.mysql.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.mssql.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.mssql.env.example" -f "$COMPOSE_DIR/docker-compose.yml" -f "$COMPOSE_DIR/docker-compose.mssql.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.oracle.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.oracle.env.example" -f "$COMPOSE_DIR/docker-compose.yml" -f "$COMPOSE_DIR/docker-compose.oracle.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.spanner.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.spanner.env.example" -f "$COMPOSE_DIR/docker-compose.yml" -f "$COMPOSE_DIR/docker-compose.spanner.yml" config >/dev/null

      - name: Validate compose render for image deployment overlays
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          ENV_EXAMPLES_DIR="infra/docker/env/examples"
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/images.postgres.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/images.postgres.env.example" -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/images.oracle.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/images.oracle.env.example" -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.oracle.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" config >/dev/null

      - name: Validate backend exposure overlay wiring
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          ENV_EXAMPLES_DIR="infra/docker/env/examples"
          cp "$ENV_EXAMPLES_DIR/production.env.example" .env.production
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/docker.postgres.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/docker.postgres.env.example" -f "$COMPOSE_DIR/docker-compose.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/production.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/production.env.example" -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" config >/dev/null
          EG_BACKEND_ENV_FILE=./infra/docker/env/examples/images.postgres.env.example docker compose --project-directory . --env-file "$ENV_EXAMPLES_DIR/images.postgres.env.example" -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" config >/dev/null

  test:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        database: [postgres, oracle]
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      oracle:
        image: gvenzl/oracle-xe:21-slim-faststart
        env:
          ORACLE_PASSWORD: oracle123
          APP_USER: main
          APP_USER_PASSWORD: oracle123
        ports:
          - 1521:1521
        options: >-
          --health-cmd="healthcheck.sh"
          --health-interval=20s
          --health-timeout=10s
          --health-retries=20
          --health-start-period=60s
    env:
      NODE_ENV: test
      DATABASE_TYPE: ${{ matrix.database }}
      JWT_SECRET: test-secret-please-change-00000000000000
      CAMUNDA_BASE_URL: http://localhost:9080/engine-rest
      POSTGRES_HOST: ${{ matrix.database == 'postgres' && 'localhost' || '' }}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${{ matrix.database == 'postgres' && 'postgres' || '' }}
      POSTGRES_PASSWORD: ${{ matrix.database == 'postgres' && 'postgres' || '' }}
      POSTGRES_DATABASE: ${{ matrix.database == 'postgres' && 'postgres' || '' }}
      POSTGRES_SCHEMA: main
      POSTGRES_SSL_REJECT_UNAUTHORIZED: false
      ORACLE_HOST: ${{ matrix.database == 'oracle' && 'localhost' || '' }}
      ORACLE_PORT: 1521
      ORACLE_USER: ${{ matrix.database == 'oracle' && 'main' || '' }}
      ORACLE_PASSWORD: ${{ matrix.database == 'oracle' && 'oracle123' || '' }}
      ORACLE_SERVICE_NAME: ${{ matrix.database == 'oracle' && 'XEPDB1' || '' }}
      ORACLE_SCHEMA: ${{ matrix.database == 'oracle' && 'MAIN' || '' }}
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install DB driver for matrix database
        if: matrix.database == 'oracle'
        run: npm --prefix backend install --no-save oracledb

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: matrix.database == 'postgres'
        run: npx playwright install --with-deps

      - name: Build backend
        run: npm --prefix backend run build:skip-generate

      - name: Create PostgreSQL schema
        if: matrix.database == 'postgres'
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS main;"

      - name: Sync database schema
        run: npm --prefix backend run db:schema:sync

      - name: Run unit tests
        if: matrix.database == 'postgres'
        run: npm run test:unit

      - name: Run integration tests
        if: matrix.database == 'postgres'
        run: npm run test:integration

      - name: Run Oracle backend smoke
        if: matrix.database == 'oracle'
        run: |
          npm --prefix backend run start &
          for i in {1..45}; do
            if curl -sf http://localhost:8787/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8787/health >/dev/null

      - name: Start Camunda mock server
        if: matrix.database == 'postgres'
        run: |
          npx --yes @stoplight/prism-cli mock local-docs/ING/api-specs/Mission-Control-Camunda-API.postman_collection.json -p 9080 &

      - name: Start backend
        if: matrix.database == 'postgres'
        run: npm --prefix backend run start &

      - name: Start frontend
        if: matrix.database == 'postgres'
        run: npm --prefix frontend run dev -- --host 0.0.0.0 --port 5173 &

      - name: Wait for services
        if: matrix.database == 'postgres'
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8787/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:5173/login >/dev/null

      - name: Run smoke e2e
        if: matrix.database == 'postgres'
        run: npm run test:e2e:smoke

      - name: Cleanup test data
        if: always() && matrix.database == 'postgres'
        run: npm --prefix backend run db:cleanup-test-data

      - name: Upload backend coverage
        if: matrix.database == 'postgres'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Upload frontend coverage
        if: matrix.database == 'postgres'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Update nightly CI marker
        if: github.event_name == 'schedule' && matrix.database == 'postgres'
        run: |
          mkdir -p .sync
          echo "${{ needs.detect.outputs.current_sha }}" > .sync/ci-main.sha
          git add .sync/ci-main.sha
          if git diff --cached --quiet; then
            echo "No marker changes to commit."
            exit 0
          fi
          git config user.name "enterpriseglue-ci-bot"
          git config user.email "ci-bot@enterpriseglue.ai"
          git commit -m "chore: update nightly CI marker"
          git push origin HEAD:main

  smoke-postgres-image-deploy:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.run_tests == 'true' && needs.detect.outputs.run_smoke == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local backend image
        run: |
          docker buildx build --load \
            --cache-from type=gha,scope=ci-smoke-backend \
            --cache-to type=gha,mode=max,scope=ci-smoke-backend \
            -f backend/Dockerfile.prod \
            -t eg-local-backend:pr \
            .

      - name: Build local frontend image
        run: |
          docker buildx build --load \
            --cache-from type=gha,scope=ci-smoke-frontend \
            --cache-to type=gha,mode=max,scope=ci-smoke-frontend \
            -f frontend/Dockerfile.prod \
            --build-arg API_BASE_URL= \
            -t eg-local-frontend:pr \
            .

      - name: Prepare image deployment env file
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=eg-local-backend"
            echo "FRONTEND_IMAGE=eg-local-frontend"
            echo "IMAGE_TAG=pr"
            echo "EG_BACKEND_ENV_FILE=./.env.images.ci"
            echo "API_PORT=8787"
            echo "FRONTEND_HOST_PORT=8080"
            echo "FRONTEND_URL=http://localhost:8080"
            echo "EXPOSE_BACKEND=false"
            echo "BACKEND_HOST_PORT=8787"
            echo "DATABASE_TYPE=postgres"
            echo "POSTGRES_SCHEMA=main"
            echo "POSTGRES_USER=enterpriseglue"
            echo "POSTGRES_PASSWORD=enterpriseglue"
            echo "POSTGRES_DB=enterpriseglue"
            echo "POSTGRES_HOST=db"
            echo "POSTGRES_PORT=5432"
            echo "POSTGRES_DATABASE=enterpriseglue"
            echo "POSTGRES_SSL=false"
            echo "POSTGRES_SSL_REJECT_UNAUTHORIZED=false"
            echo "JWT_SECRET=test_secret_for_ci_release_images_only_please_change"
            echo "ADMIN_EMAIL=admin@enterpriseglue.ai"
            echo "ADMIN_PASSWORD=change_me_change_me"
            echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            echo "GIT_REPOS_PATH=./data/repos"
            echo "GIT_DEFAULT_BRANCH=main"
            echo "API_BASE_URL="
          } > .env.images.ci

      - name: Start image deployment stack
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" up -d

      - name: Wait for frontend and backend health
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          for i in {1..45}; do
            if curl -sf http://localhost:8080/login >/dev/null && curl -sf http://localhost:8080/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/login >/dev/null
          curl -sf http://localhost:8080/health >/dev/null
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" exec -T backend node -e "require('http').get('http://127.0.0.1:'+(process.env.API_PORT||'8787')+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"

      - name: Dump stack logs on failure
        if: failure()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" logs --no-color --tail=200 backend frontend db

      - name: Stop image deployment stack
        if: always()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" down -v

  smoke-postgres-image-deploy-exposed:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.run_tests == 'true' && needs.detect.outputs.run_smoke == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local backend image
        run: |
          docker buildx build --load \
            --cache-from type=gha,scope=ci-smoke-backend \
            --cache-to type=gha,mode=max,scope=ci-smoke-backend \
            -f backend/Dockerfile.prod \
            -t eg-local-backend:pr \
            .

      - name: Build local frontend image
        run: |
          docker buildx build --load \
            --cache-from type=gha,scope=ci-smoke-frontend \
            --cache-to type=gha,mode=max,scope=ci-smoke-frontend \
            -f frontend/Dockerfile.prod \
            --build-arg API_BASE_URL= \
            -t eg-local-frontend:pr \
            .

      - name: Prepare image deployment env file (backend exposed)
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=eg-local-backend"
            echo "FRONTEND_IMAGE=eg-local-frontend"
            echo "IMAGE_TAG=pr"
            echo "EG_BACKEND_ENV_FILE=./.env.images.exposed.ci"
            echo "API_PORT=8787"
            echo "FRONTEND_HOST_PORT=8080"
            echo "FRONTEND_URL=http://localhost:8080"
            echo "EXPOSE_BACKEND=true"
            echo "BACKEND_HOST_PORT=8787"
            echo "DATABASE_TYPE=postgres"
            echo "POSTGRES_SCHEMA=main"
            echo "POSTGRES_USER=enterpriseglue"
            echo "POSTGRES_PASSWORD=enterpriseglue"
            echo "POSTGRES_DB=enterpriseglue"
            echo "POSTGRES_HOST=db"
            echo "POSTGRES_PORT=5432"
            echo "POSTGRES_DATABASE=enterpriseglue"
            echo "POSTGRES_SSL=false"
            echo "POSTGRES_SSL_REJECT_UNAUTHORIZED=false"
            echo "JWT_SECRET=test_secret_for_ci_release_images_only_please_change"
            echo "ADMIN_EMAIL=admin@enterpriseglue.ai"
            echo "ADMIN_PASSWORD=change_me_change_me"
            echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            echo "GIT_REPOS_PATH=./data/repos"
            echo "GIT_DEFAULT_BRANCH=main"
            echo "API_BASE_URL="
          } > .env.images.exposed.ci

      - name: Start image deployment stack (backend exposed)
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.exposed.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" up -d

      - name: Wait for frontend and backend direct health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health >/dev/null && curl -sf http://localhost:8787/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/health >/dev/null
          curl -sf http://localhost:8787/health >/dev/null

      - name: Dump stack logs on failure (backend exposed)
        if: failure()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.exposed.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" logs --no-color --tail=200 backend frontend db

      - name: Stop image deployment stack (backend exposed)
        if: always()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.exposed.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" down -v

  # ---------------------------------------------------------------------------
  # Single aggregate gate: required check target for branch protection.
  # Always runs. Succeeds if all work jobs succeeded or were skipped.
  # Fails if any work job failed or was cancelled.
  # ---------------------------------------------------------------------------

  ci-complete:
    runs-on: ubuntu-latest
    needs: [detect, compose-render, test, smoke-postgres-image-deploy, smoke-postgres-image-deploy-exposed]
    if: always()
    steps:
      - name: Evaluate CI result
        run: |
          echo "detect: ${{ needs.detect.result }}"
          echo "compose-render: ${{ needs.compose-render.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "smoke-postgres-image-deploy: ${{ needs.smoke-postgres-image-deploy.result }}"
          echo "smoke-postgres-image-deploy-exposed: ${{ needs.smoke-postgres-image-deploy-exposed.result }}"

          for result in \
            "${{ needs.detect.result }}" \
            "${{ needs.compose-render.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.smoke-postgres-image-deploy.result }}" \
            "${{ needs.smoke-postgres-image-deploy-exposed.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI failed: at least one job reported $result"
              exit 1
            fi
          done

          echo "All CI jobs passed or were skipped."

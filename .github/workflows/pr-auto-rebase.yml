name: PR Auto-Rebase

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-rebase
  cancel-in-progress: false

jobs:
  auto-rebase:
    uses: ./.github/workflows/pr-auto-rebase-reusable.yml
    secrets:
      push_token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

name: Docker Images (Reusable)

on:
  workflow_call:
    inputs:
      backend_image:
        required: true
        type: string
      frontend_image:
        required: true
        type: string
      dockerhub_namespace:
        required: false
        type: string
      image_tag:
        required: true
        type: string
      image_platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64
      security_rebuild:
        required: false
        type: boolean
        default: false
      enable_dockerhub:
        required: false
        type: boolean
        default: false
    outputs:
      backend_image:
        value: ${{ jobs.publish.outputs.backend_image }}
      frontend_image:
        value: ${{ jobs.publish.outputs.frontend_image }}
      image_tag:
        value: ${{ jobs.publish.outputs.image_tag }}
      publish_latest:
        value: ${{ jobs.publish.outputs.publish_latest }}
      publish_dockerhub:
        value: ${{ jobs.publish.outputs.publish_dockerhub }}
      image_platforms:
        value: ${{ jobs.publish.outputs.image_platforms }}
      backend_digest:
        value: ${{ jobs.publish.outputs.backend_digest }}
      frontend_digest:
        value: ${{ jobs.publish.outputs.frontend_digest }}
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
      publish_dockerhub: ${{ steps.meta.outputs.publish_dockerhub }}
      image_platforms: ${{ steps.meta.outputs.image_platforms }}
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx for backend
        id: buildx_backend
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names and tags
        id: meta
        shell: bash
        env:
          INPUT_BACKEND_IMAGE: ${{ inputs.backend_image }}
          INPUT_FRONTEND_IMAGE: ${{ inputs.frontend_image }}
          INPUT_DOCKERHUB_NAMESPACE: ${{ inputs.dockerhub_namespace }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_IMAGE_PLATFORMS: ${{ inputs.image_platforms }}
          ENABLE_DOCKERHUB: ${{ inputs.enable_dockerhub }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          backend_image="${INPUT_BACKEND_IMAGE}"
          frontend_image="${INPUT_FRONTEND_IMAGE}"
          dockerhub_namespace="${INPUT_DOCKERHUB_NAMESPACE:-}"
          dockerhub_backend=""
          dockerhub_frontend=""
          if [[ -n "${dockerhub_namespace}" ]]; then
            dockerhub_backend="docker.io/${dockerhub_namespace}/enterpriseglue-the-bridge-oss-backend"
            dockerhub_frontend="docker.io/${dockerhub_namespace}/enterpriseglue-the-bridge-oss-frontend"
          fi

          image_platforms="${INPUT_IMAGE_PLATFORMS:-linux/amd64,linux/arm64}"
          image_tag="${INPUT_IMAGE_TAG}"

          publish_latest="false"
          if [[ "${image_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            publish_latest="true"
          fi

          publish_dockerhub="false"
          if [[ "${ENABLE_DOCKERHUB}" == "true" && -n "${DOCKERHUB_USERNAME:-}" && -n "${dockerhub_namespace}" && "${publish_latest}" == "true" ]]; then
            publish_dockerhub="true"
          fi

          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"
          echo "publish_dockerhub=${publish_dockerhub}" >> "$GITHUB_OUTPUT"
          echo "image_platforms=${image_platforms}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_backend=${dockerhub_backend}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_frontend=${dockerhub_frontend}" >> "$GITHUB_OUTPUT"
          echo "backend_temp_tag=tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_temp_tag=tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-frontend" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: steps.meta.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Two-attempt pattern: if the first build/push hits a transient buildx
      # error (e.g. npm ECONNRESET mid-install, ghcr push 5xx, stalled arm64
      # registry TCP stream), a second attempt runs. The Dockerfile-level
      # BuildKit cache mount on ~/.npm means the second attempt only has to
      # re-fetch whatever packages failed the first time.
      - name: Build and push backend image (attempt 1)
        id: backend_try1
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ steps.buildx_backend.outputs.name }}
          context: .
          file: backend/Dockerfile.prod
          platforms: ${{ steps.meta.outputs.image_platforms }}
          pull: true
          no-cache: ${{ inputs.security_rebuild }}
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}

      - name: Build and push backend image (attempt 2 after transient failure)
        id: backend_try2
        if: steps.backend_try1.outcome == 'failure'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ steps.buildx_backend.outputs.name }}
          context: .
          file: backend/Dockerfile.prod
          platforms: ${{ steps.meta.outputs.image_platforms }}
          pull: true
          no-cache: ${{ inputs.security_rebuild }}
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}

      - name: Capture backend digest
        id: backend
        shell: bash
        run: |
          if [ "${{ steps.backend_try1.outcome }}" == "success" ]; then
            echo "digest=${{ steps.backend_try1.outputs.digest }}" >> "$GITHUB_OUTPUT"
            echo "[backend] published on attempt 1"
          else
            echo "digest=${{ steps.backend_try2.outputs.digest }}" >> "$GITHUB_OUTPUT"
            echo "[backend] published on attempt 2 (attempt 1 failed — transient)"
          fi

      - name: Verify backend image runtime contract for supported database adapters
        run: |
          COMMON_ENV=(
            -e API_PORT=8787
            -e JWT_SECRET=runtime_contract_test_secret_with_32_chars
            -e ADMIN_PASSWORD=runtime_contract_test_password
            -e ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
            -e FRONTEND_URL=http://localhost:8080
          )

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            -e DATABASE_TYPE=postgres \
            -e POSTGRES_HOST=db \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_USER=enterpriseglue \
            -e POSTGRES_PASSWORD=enterpriseglue \
            -e POSTGRES_DATABASE=enterpriseglue \
            -e POSTGRES_SCHEMA=main \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const candidates=['./dist/shared/db/adapters/index.js','./dist/src/shared/db/adapters/index.js','./dist/packages/shared/src/db/adapters/index.js']; const adapterPath=candidates.find(p=>fs.existsSync(p)); if(!adapterPath){console.error('No adapters/index.js found');process.exit(1)} const { createAdapter } = await import(adapterPath); const adapter=createAdapter('postgres'); const options=adapter.getDataSourceOptions(); if(options.type!=='postgres'){process.exit(1)} console.log('postgres runtime contract ok');"

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            -e DATABASE_TYPE=oracle \
            -e ORACLE_HOST=db \
            -e ORACLE_PORT=1521 \
            -e ORACLE_USER=enterpriseglue \
            -e ORACLE_PASSWORD=oracle \
            -e ORACLE_SERVICE_NAME=XEPDB1 \
            -e ORACLE_SCHEMA=ENTERPRISEGLUE \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const candidates=['./dist/shared/db/adapters/index.js','./dist/src/shared/db/adapters/index.js','./dist/packages/shared/src/db/adapters/index.js']; const adapterPath=candidates.find(p=>fs.existsSync(p)); if(!adapterPath){console.error('No adapters/index.js found');process.exit(1)} const { createAdapter } = await import(adapterPath); const adapter=createAdapter('oracle'); const options=adapter.getDataSourceOptions(); if(options.type!=='oracle'){process.exit(1)} console.log('oracle runtime contract ok');"

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            -e DATABASE_TYPE=mysql \
            -e MYSQL_HOST=db \
            -e MYSQL_PORT=3306 \
            -e MYSQL_USER=enterpriseglue \
            -e MYSQL_PASSWORD=enterpriseglue \
            -e MYSQL_DATABASE=enterpriseglue \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const candidates=['./dist/shared/db/adapters/index.js','./dist/src/shared/db/adapters/index.js','./dist/packages/shared/src/db/adapters/index.js']; const adapterPath=candidates.find(p=>fs.existsSync(p)); if(!adapterPath){console.error('No adapters/index.js found');process.exit(1)} const { createAdapter } = await import(adapterPath); const adapter=createAdapter('mysql'); const options=adapter.getDataSourceOptions(); if(options.type!=='mysql'){process.exit(1)} console.log('mysql runtime contract ok');"

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            -e DATABASE_TYPE=mssql \
            -e MSSQL_HOST=db \
            -e MSSQL_PORT=1433 \
            -e MSSQL_USER=sa \
            -e MSSQL_PASSWORD='Str0ngPassword!_123' \
            -e MSSQL_DATABASE=master \
            -e MSSQL_SCHEMA=dbo \
            -e MSSQL_ENCRYPT=false \
            -e MSSQL_TRUST_SERVER_CERTIFICATE=true \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const candidates=['./dist/shared/db/adapters/index.js','./dist/src/shared/db/adapters/index.js','./dist/packages/shared/src/db/adapters/index.js']; const adapterPath=candidates.find(p=>fs.existsSync(p)); if(!adapterPath){console.error('No adapters/index.js found');process.exit(1)} const { createAdapter } = await import(adapterPath); const adapter=createAdapter('mssql'); const options=adapter.getDataSourceOptions(); if(options.type!=='mssql'){process.exit(1)} console.log('mssql runtime contract ok');"

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            -e DATABASE_TYPE=spanner \
            -e SPANNER_PROJECT_ID=test-project \
            -e SPANNER_INSTANCE_ID=test-instance \
            -e SPANNER_DATABASE_ID=test-database \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const candidates=['./dist/shared/db/adapters/index.js','./dist/src/shared/db/adapters/index.js','./dist/packages/shared/src/db/adapters/index.js']; const adapterPath=candidates.find(p=>fs.existsSync(p)); if(!adapterPath){console.error('No adapters/index.js found');process.exit(1)} const { createAdapter } = await import(adapterPath); const adapter=createAdapter('spanner'); const options=adapter.getDataSourceOptions(); if(options.type!=='spanner'){process.exit(1)} console.log('spanner runtime contract ok');"

          docker run --rm --entrypoint '' \
            "${COMMON_ENV[@]}" \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" \
            node --input-type=module -e "import fs from 'fs'; const paths=['/usr/bin/npm','/usr/bin/npx','/usr/lib/node_modules/npm']; const found=paths.filter((p)=>fs.existsSync(p)); const db=fs.existsSync('/lib/apk/db/installed') ? fs.readFileSync('/lib/apk/db/installed','utf8') : ''; if(found.length || db.includes('P:npm\n')){console.error('npm must not be present in final backend image', { found, hasNpmPackage: db.includes('P:npm\n') }); process.exit(1)} console.log('backend runtime contract ok: npm absent');"

      - name: Verify backend temporary image ref
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}" >/dev/null

      - name: Set up Docker Buildx for frontend
        id: buildx_frontend
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Two-attempt pattern — see backend build for rationale. This step in
      # particular hung for 1h20m on the arm64 leg of v0.9.1 and caused the
      # entire publish run to be cancelled; the retry wrapper + Dockerfile
      # cache mount specifically address that failure mode.
      - name: Build and push frontend image (attempt 1)
        id: frontend_try1
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ steps.buildx_frontend.outputs.name }}
          context: .
          file: frontend/Dockerfile.prod
          platforms: ${{ steps.meta.outputs.image_platforms }}
          pull: true
          no-cache: ${{ inputs.security_rebuild }}
          push: true
          build-args: |
            API_BASE_URL=
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.frontend_temp_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}

      - name: Build and push frontend image (attempt 2 after transient failure)
        id: frontend_try2
        if: steps.frontend_try1.outcome == 'failure'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ steps.buildx_frontend.outputs.name }}
          context: .
          file: frontend/Dockerfile.prod
          platforms: ${{ steps.meta.outputs.image_platforms }}
          pull: true
          no-cache: ${{ inputs.security_rebuild }}
          push: true
          build-args: |
            API_BASE_URL=
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.frontend_temp_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}

      - name: Capture frontend digest
        id: frontend
        shell: bash
        run: |
          if [ "${{ steps.frontend_try1.outcome }}" == "success" ]; then
            echo "digest=${{ steps.frontend_try1.outputs.digest }}" >> "$GITHUB_OUTPUT"
            echo "[frontend] published on attempt 1"
          else
            echo "digest=${{ steps.frontend_try2.outputs.digest }}" >> "$GITHUB_OUTPUT"
            echo "[frontend] published on attempt 2 (attempt 1 failed — transient)"
          fi

      - name: Verify frontend temporary image ref
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.frontend_temp_tag }}" >/dev/null

      - name: Promote backend version tag
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}" \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.backend_temp_tag }}"

      - name: Promote frontend version tag
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}" \
            "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.frontend_temp_tag }}"

      - name: Promote backend latest tag
        if: steps.meta.outputs.publish_latest == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.backend_image }}:latest" \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Promote frontend latest tag
        if: steps.meta.outputs.publish_latest == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.frontend_image }}:latest" \
            "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Publish backend version tag on Docker Hub
        if: steps.meta.outputs.publish_dockerhub == 'true' && steps.meta.outputs.dockerhub_backend != ''
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.dockerhub_backend }}:${{ steps.meta.outputs.image_tag }}" \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Publish frontend version tag on Docker Hub
        if: steps.meta.outputs.publish_dockerhub == 'true' && steps.meta.outputs.dockerhub_frontend != ''
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.dockerhub_frontend }}:${{ steps.meta.outputs.image_tag }}" \
            "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Promote backend latest tag on Docker Hub
        if: steps.meta.outputs.publish_dockerhub == 'true' && steps.meta.outputs.publish_latest == 'true' && steps.meta.outputs.dockerhub_backend != ''
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.dockerhub_backend }}:latest" \
            "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Promote frontend latest tag on Docker Hub
        if: steps.meta.outputs.publish_dockerhub == 'true' && steps.meta.outputs.publish_latest == 'true' && steps.meta.outputs.dockerhub_frontend != ''
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.dockerhub_frontend }}:latest" \
            "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}"

      - name: Verify published image refs
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}" >/dev/null
          docker buildx imagetools inspect "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}" >/dev/null
          if [[ "${{ steps.meta.outputs.publish_latest }}" == "true" ]]; then
            docker buildx imagetools inspect "${{ steps.meta.outputs.backend_image }}:latest" >/dev/null
            docker buildx imagetools inspect "${{ steps.meta.outputs.frontend_image }}:latest" >/dev/null
          fi
          if [[ "${{ steps.meta.outputs.publish_dockerhub }}" == "true" && -n "${{ steps.meta.outputs.dockerhub_frontend }}" ]]; then
            docker buildx imagetools inspect "${{ steps.meta.outputs.dockerhub_backend }}:${{ steps.meta.outputs.image_tag }}" >/dev/null
            docker buildx imagetools inspect "${{ steps.meta.outputs.dockerhub_frontend }}:${{ steps.meta.outputs.image_tag }}" >/dev/null
            if [[ "${{ steps.meta.outputs.publish_latest }}" == "true" ]]; then
              docker buildx imagetools inspect "${{ steps.meta.outputs.dockerhub_backend }}:latest" >/dev/null
              docker buildx imagetools inspect "${{ steps.meta.outputs.dockerhub_frontend }}:latest" >/dev/null
            fi
          fi

      - name: Publish summary
        run: |
          echo "backend_image=${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "frontend_image=${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "platforms=${{ steps.meta.outputs.image_platforms }}" >> "$GITHUB_STEP_SUMMARY"
          echo "backend_digest=${{ steps.backend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "frontend_digest=${{ steps.frontend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "publish_latest=${{ steps.meta.outputs.publish_latest }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Capture image digest metadata
        run: |
          set -euo pipefail
          cat > image-digests.json <<EOF
          {
            "backend_image": "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}",
            "frontend_image": "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}",
            "backend_digest": "${{ steps.backend.outputs.digest }}",
            "frontend_digest": "${{ steps.frontend.outputs.digest }}",
            "platforms": "${{ steps.meta.outputs.image_platforms }}",
            "publish_latest": "${{ steps.meta.outputs.publish_latest }}"
          }
          EOF

      - name: Upload image digest artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-digests-${{ steps.meta.outputs.image_tag }}
          path: image-digests.json
          if-no-files-found: error
          retention-days: 7

      - name: Verify multi-arch manifest coverage
        shell: bash
        run: |
          set -euo pipefail
          expected_platforms="${{ steps.meta.outputs.image_platforms }}"
          backend_ref="${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}"
          frontend_ref="${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}"

          backend_manifest="$(docker buildx imagetools inspect "$backend_ref")"
          frontend_manifest="$(docker buildx imagetools inspect "$frontend_ref")"

          IFS=',' read -ra platforms <<< "$expected_platforms"
          for platform in "${platforms[@]}"; do
            if ! grep -Fq "$platform" <<< "$backend_manifest"; then
              echo "Backend manifest missing platform: $platform"
              exit 1
            fi
            if ! grep -Fq "$platform" <<< "$frontend_manifest"; then
              echo "Frontend manifest missing platform: $platform"
              exit 1
            fi
          done

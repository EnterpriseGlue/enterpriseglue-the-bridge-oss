name: Docker Images

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      security_rebuild:
        description: Rebuild without cache and pull latest base image layers
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_platforms: ${{ steps.meta.outputs.image_platforms }}
    steps:
      - name: Resolve image names and tags
        id: meta
        shell: bash
        env:
          INPUT_BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE }}
          INPUT_FRONTEND_IMAGE: ${{ vars.FRONTEND_IMAGE }}
          INPUT_IMAGE_PLATFORMS: ${{ vars.IMAGE_PLATFORMS }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          backend_default="ghcr.io/${owner_lc}/enterpriseglue-the-bridge-oss-backend"
          frontend_default="ghcr.io/${owner_lc}/enterpriseglue-the-bridge-oss-frontend"

          backend_image="${INPUT_BACKEND_IMAGE:-$backend_default}"
          frontend_image="${INPUT_FRONTEND_IMAGE:-$frontend_default}"

          image_platforms="${INPUT_IMAGE_PLATFORMS:-linux/amd64,linux/arm64}"

          if [[ "${EVENT_NAME}" == "release" && -n "${RELEASE_TAG}" ]]; then
            image_tag="${RELEASE_TAG}"
          elif [[ "${REF_TYPE}" == "tag" ]]; then
            image_tag="${REF_NAME}"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi

          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_platforms=${image_platforms}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    uses: ./.github/workflows/docker-images-reusable.yml
    with:
      backend_image: ${{ needs.resolve.outputs.backend_image }}
      frontend_image: ${{ needs.resolve.outputs.frontend_image }}
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE }}
      image_tag: ${{ needs.resolve.outputs.image_tag }}
      image_platforms: ${{ needs.resolve.outputs.image_platforms }}
      security_rebuild: ${{ github.event_name == 'workflow_dispatch' && inputs.security_rebuild }}
      enable_dockerhub: ${{ github.event_name == 'release' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  smoke-postgres-image-deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image deployment env file
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=${{ needs.publish.outputs.backend_image }}"
            echo "FRONTEND_IMAGE=${{ needs.publish.outputs.frontend_image }}"
            echo "IMAGE_TAG=${{ needs.publish.outputs.image_tag }}"
            echo "EG_BACKEND_ENV_FILE=./.env.images.ci"
            echo "API_PORT=8787"
            echo "FRONTEND_HOST_PORT=8080"
            echo "FRONTEND_URL=http://localhost:8080"
            echo "EXPOSE_BACKEND=false"
            echo "BACKEND_HOST_PORT=8787"
            echo "DATABASE_TYPE=postgres"
            echo "POSTGRES_SCHEMA=main"
            echo "POSTGRES_USER=enterpriseglue"
            echo "POSTGRES_PASSWORD=enterpriseglue"
            echo "POSTGRES_DB=enterpriseglue"
            echo "POSTGRES_HOST=db"
            echo "POSTGRES_PORT=5432"
            echo "POSTGRES_DATABASE=enterpriseglue"
            echo "POSTGRES_SSL=false"
            echo "POSTGRES_SSL_REJECT_UNAUTHORIZED=false"
            echo "JWT_SECRET=test_secret_for_ci_release_images_only_please_change"
            echo "ADMIN_EMAIL=admin@enterpriseglue.ai"
            echo "ADMIN_PASSWORD=change_me_change_me"
            echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            echo "GIT_REPOS_PATH=./data/repos"
            echo "GIT_DEFAULT_BRANCH=main"
            echo "API_BASE_URL="
          } > .env.images.ci

      - name: Start image deployment stack
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" up -d

      - name: Wait for frontend and backend health
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          for i in {1..45}; do
            if curl -sf http://localhost:8080/login >/dev/null && curl -sf http://localhost:8080/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/login >/dev/null
          curl -sf http://localhost:8080/health >/dev/null
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" exec -T backend node -e "require('http').get('http://127.0.0.1:'+(process.env.API_PORT||'8787')+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"

      - name: Stop image deployment stack
        if: always()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" down -v

  smoke-postgres-image-deploy-exposed:
    needs: publish
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image deployment env file (backend exposed)
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=${{ needs.publish.outputs.backend_image }}"
            echo "FRONTEND_IMAGE=${{ needs.publish.outputs.frontend_image }}"
            echo "IMAGE_TAG=${{ needs.publish.outputs.image_tag }}"
            echo "EG_BACKEND_ENV_FILE=./.env.images.exposed.ci"
            echo "API_PORT=8787"
            echo "FRONTEND_HOST_PORT=8080"
            echo "FRONTEND_URL=http://localhost:8080"
            echo "EXPOSE_BACKEND=true"
            echo "BACKEND_HOST_PORT=8787"
            echo "DATABASE_TYPE=postgres"
            echo "POSTGRES_SCHEMA=main"
            echo "POSTGRES_USER=enterpriseglue"
            echo "POSTGRES_PASSWORD=enterpriseglue"
            echo "POSTGRES_DB=enterpriseglue"
            echo "POSTGRES_HOST=db"
            echo "POSTGRES_PORT=5432"
            echo "POSTGRES_DATABASE=enterpriseglue"
            echo "POSTGRES_SSL=false"
            echo "POSTGRES_SSL_REJECT_UNAUTHORIZED=false"
            echo "JWT_SECRET=test_secret_for_ci_release_images_only_please_change"
            echo "ADMIN_EMAIL=admin@enterpriseglue.ai"
            echo "ADMIN_PASSWORD=change_me_change_me"
            echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            echo "GIT_REPOS_PATH=./data/repos"
            echo "GIT_DEFAULT_BRANCH=main"
            echo "API_BASE_URL="
          } > .env.images.exposed.ci

      - name: Start image deployment stack (backend exposed)
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.exposed.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" up -d

      - name: Wait for frontend and backend direct health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health >/dev/null && curl -sf http://localhost:8787/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/health >/dev/null
          curl -sf http://localhost:8787/health >/dev/null

      - name: Stop image deployment stack (backend exposed)
        if: always()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.exposed.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" -f "$COMPOSE_DIR/docker-compose.backend-expose.yml" down -v

  smoke-oracle-image-deploy:
    needs: publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare oracle image deployment env file
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=${{ needs.publish.outputs.backend_image }}"
            echo "FRONTEND_IMAGE=${{ needs.publish.outputs.frontend_image }}"
            echo "IMAGE_TAG=${{ needs.publish.outputs.image_tag }}"
            echo "EG_BACKEND_ENV_FILE=./.env.images.oracle.ci"
            echo "API_PORT=8787"
            echo "FRONTEND_HOST_PORT=8080"
            echo "FRONTEND_URL=http://localhost:8080"
            echo "EXPOSE_BACKEND=false"
            echo "BACKEND_HOST_PORT=8787"
            echo "DATABASE_TYPE=oracle"
            echo "ORACLE_HOST=db"
            echo "ORACLE_PORT=1521"
            echo "ORACLE_USER=enterpriseglue"
            echo "ORACLE_PASSWORD=oracle"
            echo "ORACLE_SERVICE_NAME=XEPDB1"
            echo "ORACLE_SCHEMA=ENTERPRISEGLUE"
            echo "ORACLE_HOST_PORT=1521"
            echo "JWT_SECRET=test_secret_for_ci_release_images_only_please_change"
            echo "ADMIN_EMAIL=admin@enterpriseglue.ai"
            echo "ADMIN_PASSWORD=change_me_change_me"
            echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            echo "GIT_REPOS_PATH=./data/repos"
            echo "GIT_DEFAULT_BRANCH=main"
            echo "API_BASE_URL="
          } > .env.images.oracle.ci

      - name: Start oracle image deployment stack
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.oracle.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.oracle.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" up -d

      - name: Wait for frontend and backend health (oracle)
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_DIR="infra/docker/compose"
          for i in {1..120}; do
            if curl -sf http://localhost:8080/login >/dev/null && curl -sf http://localhost:8080/health >/dev/null; then
              break
            fi
            sleep 3
          done
          curl -sf http://localhost:8080/login >/dev/null
          curl -sf http://localhost:8080/health >/dev/null
          docker compose --project-directory . --env-file .env.images.oracle.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.oracle.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" exec -T backend node -e "require('http').get('http://127.0.0.1:'+(process.env.API_PORT||'8787')+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"

      - name: Stop oracle image deployment stack
        if: always()
        run: |
          COMPOSE_DIR="infra/docker/compose"
          docker compose --project-directory . --env-file .env.images.oracle.ci -f "$COMPOSE_DIR/docker-compose.prod.yml" -f "$COMPOSE_DIR/docker-compose.oracle.yml" -f "$COMPOSE_DIR/docker-compose.images.yml" down -v

  # ---------------------------------------------------------------------------
  # Security gate: Trivy scan on published image refs.
  # Zero-tolerance policy — blocks on any severity.
  # Use .trivyignore with owner + expiry for accepted exceptions.
  # ---------------------------------------------------------------------------

  security-published-scan:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan backend published image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.publish.outputs.backend_image }}:${{ needs.publish.outputs.image_tag }}'
          format: 'json'
          output: 'backend-trivy.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

      - name: Trivy scan frontend published image
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.publish.outputs.frontend_image }}:${{ needs.publish.outputs.image_tag }}'
          format: 'json'
          output: 'frontend-trivy.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-published-findings-${{ github.run_id }}
          path: |
            backend-trivy.json
            frontend-trivy.json
          if-no-files-found: warn

      - name: Security scan summary
        if: always()
        run: |
          echo "## Published Image Security Scan" >> "$GITHUB_STEP_SUMMARY"
          for img in backend frontend; do
            file="${img}-trivy.json"
            if [ -f "$file" ]; then
              total=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' "$file")
              critical=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "CRITICAL")] | length' "$file")
              high=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "HIGH")] | length' "$file")
              medium=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "MEDIUM")] | length' "$file")
              low=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "LOW")] | length' "$file")
              echo "### ${img}" >> "$GITHUB_STEP_SUMMARY"
              echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
              echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Critical | ${critical} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| High | ${high} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Medium | ${medium} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Low | ${low} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| **Total** | **${total}** |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

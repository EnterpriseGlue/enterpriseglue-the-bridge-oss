name: Release Policy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release policy requirements
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              // merge_group events have no PR payload — pass through
              core.notice('No pull request context (merge_group). Skipping release policy check.');
              return;
            }

            if (pr.draft) {
              core.notice('Draft PR: release policy check is informational until ready for review.');
              return;
            }

            const isReleasePleaseBranch = String(pr.head?.ref || '').startsWith('release-please--branches--');
            // On opened/reopened the pr-release-labeler workflow runs concurrently.
            // The event payload labels are stale, so wait briefly then fetch fresh labels
            // from the API to avoid a false-negative race condition.
            const needsFresh = ['opened', 'reopened', 'ready_for_review'].includes(context.payload.action);
            let labels;
            if (needsFresh) {
              await new Promise((r) => setTimeout(r, 15000));
              const { data: freshPR } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              labels = (freshPR.labels || []).map((label) => label.name);
            } else {
              labels = (pr.labels || []).map((label) => label.name);
            }
            const isReleasePleaseLabel = labels.includes('autorelease: pending') || labels.includes('autorelease: triggered');
            if (isReleasePleaseBranch || isReleasePleaseLabel) {
              core.notice('Release Please PR detected. Skipping release policy enforcement.');
              return;
            }

            // --- Conventional PR title lint (merged from pr-title-lint.yml) ---
            const title = String(pr.title || '').trim();
            const conventionalPattern = /^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s.+$/;
            if (!conventionalPattern.test(title)) {
              core.setFailed(
                `PR title must follow conventional format: type(scope): summary. Received: "${title}"`
              );
              return;
            }

            const titleTypeMatch = title.match(/^([a-z]+)/);
            const titleType = titleTypeMatch ? titleTypeMatch[1] : '';
            const allowedTypes = new Set(['feat', 'fix', 'docs', 'refactor', 'test', 'chore', 'ci', 'build', 'perf', 'revert', 'style']);
            if (!allowedTypes.has(titleType)) {
              core.setFailed(
                `Unsupported conventional type "${titleType}". Allowed types: ${Array.from(allowedTypes).join(', ')}`
              );
              return;
            }

            // --- Release label requirement ---
            const releaseLabels = new Set([
              'release:breaking',
              'release:feature',
              'release:fix',
              'release:security',
              'release:docs',
              'release:internal',
              'release:deprecation',
              'release:compat'
            ]);

            const selectedReleaseLabels = labels.filter((label) => releaseLabels.has(label));
            if (selectedReleaseLabels.length === 0) {
              core.setFailed('Missing release label. Add one release:* label to classify this PR.');
              return;
            }

            if (selectedReleaseLabels.length > 1) {
              core.setFailed(`Multiple release labels found (${selectedReleaseLabels.join(', ')}). Keep exactly one release:* label.`);
              return;
            }

            const body = String(pr.body || '');
            const conventionalTitleMatch = title.match(/^([a-z]+)(\([a-z0-9._/-]+\))?(!)?:\s.+$/i);
            if (conventionalTitleMatch) {
              const titleHasBreakingMarker = Boolean(conventionalTitleMatch[3]);
              const allowedLabelsByType = {
                feat: new Set(['release:feature', 'release:breaking', 'release:security', 'release:compat']),
                fix: new Set(['release:fix', 'release:breaking', 'release:security', 'release:compat']),
                docs: new Set(['release:docs', 'release:internal']),
                perf: new Set(['release:feature', 'release:fix', 'release:internal', 'release:breaking']),
                refactor: new Set(['release:internal', 'release:compat', 'release:deprecation', 'release:breaking']),
                test: new Set(['release:internal']),
                chore: new Set(['release:internal']),
                ci: new Set(['release:internal']),
                build: new Set(['release:internal']),
                style: new Set(['release:internal']),
                revert: new Set(['release:fix', 'release:internal', 'release:breaking'])
              };

              if (titleHasBreakingMarker && !labels.includes('release:breaking')) {
                core.setFailed('PR title uses breaking marker (!) but release:breaking label is missing.');
                return;
              }

              const allowedLabels = allowedLabelsByType[titleType];
              if (allowedLabels && !labels.some((label) => allowedLabels.has(label))) {
                core.setFailed(
                  `PR title type "${titleType}" is inconsistent with release label(s): ${labels.join(', ')}. ` +
                  `Expected one of: ${Array.from(allowedLabels).join(', ')}`
                );
                return;
              }
            }

            const titleIndicatesBreaking = /!\s*:/.test(title) || /\)!:/.test(title);
            const labelIndicatesBreaking = labels.includes('release:breaking');
            const bodyIndicatesBreaking = /breaking\s+change/i.test(body);
            const isBreaking = titleIndicatesBreaking || labelIndicatesBreaking || bodyIndicatesBreaking;

            if (!isBreaking) {
              core.notice('Release policy check passed (non-breaking change).');
              return;
            }

            const bodyLower = body.toLowerCase();
            const hasCompatibility = bodyLower.includes('compat') || bodyLower.includes('backward');
            const hasMigration = bodyLower.includes('migration');

            if (!hasCompatibility || !hasMigration) {
              core.setFailed('Breaking change detected. Add compatibility and migration notes to the PR description before merge.');
              return;
            }

            core.notice('Release policy check passed (breaking change includes compatibility + migration notes).');

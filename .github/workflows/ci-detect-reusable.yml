name: CI Detect Reusable

on:
  workflow_call:
    inputs:
      enable_plugin_package:
        description: Enable plugin package artifact lane gating output
        required: false
        type: boolean
        default: true
      security_scan_on_smoke_only:
        description: Run security scan only when smoke lane should run
        required: false
        type: boolean
        default: true
    outputs:
      run_tests:
        value: ${{ jobs.detect.outputs.run_tests }}
      current_sha:
        value: ${{ jobs.detect.outputs.current_sha }}
      run_postgres:
        value: ${{ jobs.detect.outputs.run_postgres }}
      run_oracle:
        value: ${{ jobs.detect.outputs.run_oracle }}
      run_smoke:
        value: ${{ jobs.detect.outputs.run_smoke }}
      test_databases:
        value: ${{ jobs.detect.outputs.test_databases }}
      run_boundary_guards:
        value: ${{ jobs.detect.outputs.run_boundary_guards }}
      run_plugin_checks:
        value: ${{ jobs.detect.outputs.run_plugin_checks }}
      run_plugin_package:
        value: ${{ jobs.detect.outputs.run_plugin_package }}
      run_security_scan:
        value: ${{ jobs.detect.outputs.run_security_scan }}
      run_smoke_exposed:
        value: ${{ jobs.detect.outputs.run_smoke_exposed }}
      changed_files_count:
        value: ${{ jobs.detect.outputs.changed_files_count }}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_tests: ${{ steps.detect.outputs.run_tests }}
      current_sha: ${{ steps.detect.outputs.current_sha }}
      run_postgres: ${{ steps.detect.outputs.run_postgres }}
      run_oracle: ${{ steps.detect.outputs.run_oracle }}
      run_smoke: ${{ steps.detect.outputs.run_smoke }}
      test_databases: ${{ steps.detect.outputs.test_databases }}
      run_boundary_guards: ${{ steps.detect.outputs.run_boundary_guards }}
      run_plugin_checks: ${{ steps.detect.outputs.run_plugin_checks }}
      run_plugin_package: ${{ steps.detect.outputs.run_plugin_package }}
      run_security_scan: ${{ steps.detect.outputs.run_security_scan }}
      run_smoke_exposed: ${{ steps.detect.outputs.run_smoke_exposed }}
      changed_files_count: ${{ steps.detect.outputs.changed_files_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changes since last nightly run
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ENABLE_PLUGIN_PACKAGE: ${{ inputs.enable_plugin_package }}
          SECURITY_SCAN_ON_SMOKE_ONLY: ${{ inputs.security_scan_on_smoke_only }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          normalize_bool() {
            if [ "${1:-}" = "true" ]; then
              echo "true"
            else
              echo "false"
            fi
          }

          ENABLE_PLUGIN_PACKAGE="$(normalize_bool "$ENABLE_PLUGIN_PACKAGE")"
          SECURITY_SCAN_ON_SMOKE_ONLY="$(normalize_bool "$SECURITY_SCAN_ON_SMOKE_ONLY")"

          emit_all_true() {
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_postgres=true" >> "$GITHUB_OUTPUT"
            echo "run_oracle=true" >> "$GITHUB_OUTPUT"
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
            echo 'test_databases=["postgres","oracle"]' >> "$GITHUB_OUTPUT"
            echo "run_boundary_guards=true" >> "$GITHUB_OUTPUT"
            echo "run_plugin_checks=true" >> "$GITHUB_OUTPUT"
            echo "run_plugin_package=$ENABLE_PLUGIN_PACKAGE" >> "$GITHUB_OUTPUT"
            echo "run_security_scan=true" >> "$GITHUB_OUTPUT"
            echo "run_smoke_exposed=true" >> "$GITHUB_OUTPUT"
          }

          CURRENT_SHA=$(git rev-parse HEAD)
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            emit_all_true
            echo "changed_files_count=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            if [ "${PR_DRAFT}" = "true" ]; then
              echo "run_tests=false"  >> "$GITHUB_OUTPUT"
              echo "run_postgres=false" >> "$GITHUB_OUTPUT"
              echo "run_oracle=false"  >> "$GITHUB_OUTPUT"
              echo "run_smoke=false"   >> "$GITHUB_OUTPUT"
              echo 'test_databases=["postgres"]' >> "$GITHUB_OUTPUT"
              echo "run_boundary_guards=false" >> "$GITHUB_OUTPUT"
              echo "run_plugin_checks=false" >> "$GITHUB_OUTPUT"
              echo "run_plugin_package=false" >> "$GITHUB_OUTPUT"
              echo "run_security_scan=false" >> "$GITHUB_OUTPUT"
              echo "run_smoke_exposed=false" >> "$GITHUB_OUTPUT"
              echo "changed_files_count=draft" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA:-$CURRENT_SHA}"
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
            CHANGED_COUNT="$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
            echo "changed_files_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"

            if [ -z "$CHANGED_FILES" ]; then
              emit_all_true
              exit 0
            fi

            backend_changed=false
            frontend_changed=false
            infra_changed=false
            db_changed=false
            ci_only=true

            if grep -Eq '^(backend/|packages/contracts/|package\.json|package-lock\.json)' <<< "$CHANGED_FILES"; then backend_changed=true; ci_only=false; fi
            if grep -Eq '^(frontend/|packages/contracts/|package\.json|package-lock\.json)' <<< "$CHANGED_FILES"; then frontend_changed=true; ci_only=false; fi
            if grep -Eq '^(infra/docker/|infra/kubernetes/|scripts/smoke-images-local\.sh|backend/Dockerfile\.prod|frontend/Dockerfile\.prod)' <<< "$CHANGED_FILES"; then infra_changed=true; ci_only=false; fi
            if grep -Eq '^backend/src/shared/db/|^backend/src/shared/config/|^backend/src/modules/.*/.*(db|migration)|^backend/.+migration' <<< "$CHANGED_FILES"; then db_changed=true; ci_only=false; fi
            if grep -Evq '^(docs/|README\.md|CHANGELOG\.md|CODE_OF_CONDUCT\.md|CONTRIBUTING\.md|LICENSE|SECURITY\.md|SUPPORT\.md|THIRD_PARTY_NOTICES\.md|third_party_licenses\.json|\.github/|local-docs/|\.sync/|\.windsurf/|\.vscode/|archive/)' <<< "$CHANGED_FILES"; then ci_only=false; fi

            run_tests=false
            run_postgres=false
            run_oracle=false
            run_smoke=false
            run_boundary_guards=false
            run_plugin_checks=false
            run_plugin_package=false
            run_security_scan=false
            run_smoke_exposed=false

            if [ "$ci_only" = false ]; then
              run_tests=true
              if [ "$backend_changed" = true ] || [ "$frontend_changed" = true ] || [ "$infra_changed" = true ]; then
                run_postgres=true
              fi
              if [ "$backend_changed" = true ] || [ "$db_changed" = true ] || [ "$infra_changed" = true ]; then
                run_oracle=true
              fi
              if [ "$backend_changed" = true ] || [ "$frontend_changed" = true ] || [ "$infra_changed" = true ] || [ "$db_changed" = true ]; then
                run_smoke=true
              fi

              run_boundary_guards=true
              if [ "$backend_changed" = true ] || [ "$frontend_changed" = true ]; then
                run_plugin_checks=true
                if [ "$ENABLE_PLUGIN_PACKAGE" = "true" ]; then
                  run_plugin_package=true
                fi
              fi

              if [ "$SECURITY_SCAN_ON_SMOKE_ONLY" = "true" ]; then
                if [ "$run_smoke" = true ]; then
                  run_security_scan=true
                fi
              elif [ "$backend_changed" = true ] || [ "$frontend_changed" = true ] || [ "$infra_changed" = true ]; then
                run_security_scan=true
              fi

              if [ "$run_smoke" = true ] && [ "$infra_changed" = true ]; then
                run_smoke_exposed=true
              fi
            fi

            if [ "$run_tests" = true ] && [ "$run_postgres" = false ] && [ "$run_oracle" = false ]; then
              run_postgres=true
            fi

            test_databases='["postgres"]'
            if [ "$run_postgres" = true ] && [ "$run_oracle" = true ]; then
              test_databases='["postgres","oracle"]'
            elif [ "$run_oracle" = true ]; then
              test_databases='["oracle"]'
            fi

            echo "run_tests=$run_tests" >> "$GITHUB_OUTPUT"
            echo "run_postgres=$run_postgres" >> "$GITHUB_OUTPUT"
            echo "run_oracle=$run_oracle" >> "$GITHUB_OUTPUT"
            echo "run_smoke=$run_smoke" >> "$GITHUB_OUTPUT"
            echo "test_databases=$test_databases" >> "$GITHUB_OUTPUT"
            echo "run_boundary_guards=$run_boundary_guards" >> "$GITHUB_OUTPUT"
            echo "run_plugin_checks=$run_plugin_checks" >> "$GITHUB_OUTPUT"
            echo "run_plugin_package=$run_plugin_package" >> "$GITHUB_OUTPUT"
            echo "run_security_scan=$run_security_scan" >> "$GITHUB_OUTPUT"
            echo "run_smoke_exposed=$run_smoke_exposed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # merge_group: the PR already passed full CI — run a lighter validation
          # Keep fast static/build/image smoke validation on the queued SHA, but
          # skip duplicate PR-only lanes such as Oracle, plugin compatibility,
          # plugin packaging, and security scanning.
          if [ "${EVENT_NAME}" = "merge_group" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_postgres=true" >> "$GITHUB_OUTPUT"
            echo "run_oracle=false" >> "$GITHUB_OUTPUT"
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
            echo 'test_databases=["postgres"]' >> "$GITHUB_OUTPUT"
            echo "run_boundary_guards=true" >> "$GITHUB_OUTPUT"
            echo "run_plugin_checks=false" >> "$GITHUB_OUTPUT"
            echo "run_plugin_package=false" >> "$GITHUB_OUTPUT"
            echo "run_security_scan=false" >> "$GITHUB_OUTPUT"
            echo "run_smoke_exposed=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=merge-queue" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit_all_true
            echo "changed_files_count=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SHA=$(
            gh api "repos/{owner}/{repo}/actions/workflows/ci.yml/runs?event=schedule&status=success&per_page=1" \
              --jq '.workflow_runs[0].head_sha // ""' 2>/dev/null || echo ""
          )
          echo "last_successful_nightly_sha=$LAST_SHA" >> "$GITHUB_OUTPUT"

          if [ -n "$LAST_SHA" ] && [ "$CURRENT_SHA" = "$LAST_SHA" ]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "run_postgres=false" >> "$GITHUB_OUTPUT"
            echo "run_oracle=false" >> "$GITHUB_OUTPUT"
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
            echo 'test_databases=["postgres"]' >> "$GITHUB_OUTPUT"
            echo "run_boundary_guards=false" >> "$GITHUB_OUTPUT"
            echo "run_plugin_checks=false" >> "$GITHUB_OUTPUT"
            echo "run_plugin_package=false" >> "$GITHUB_OUTPUT"
            echo "run_security_scan=false" >> "$GITHUB_OUTPUT"
            echo "run_smoke_exposed=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
          else
            emit_all_true
            echo "changed_files_count=since-last-nightly" >> "$GITHUB_OUTPUT"
          fi

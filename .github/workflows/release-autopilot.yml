name: Release Autopilot

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-autopilot-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-release-pr-automerge:
    if: ${{ github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate autopilot eligibility
        id: evaluate
        uses: actions/github-script@v7
        env:
          AI_AUTOPILOT_ENABLED: ${{ vars.AI_AUTOPILOT_ENABLED || 'false' }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const autopilotEnabled = String(process.env.AI_AUTOPILOT_ENABLED || 'false').toLowerCase() === 'true';
            if (!autopilotEnabled) {
              core.notice('AI_AUTOPILOT_ENABLED is false. Skipping release autopilot merge.');
              core.setOutput('should_enable', 'false');
              return;
            }

            const labels = (pr.labels || []).map((label) => label.name);
            const isReleasePleaseBranch = (pr.head.ref || '').startsWith('release-please--branches--');
            const isReleasePleaseLabel = labels.includes('autorelease: pending') || labels.includes('autorelease: triggered');
            const isReleasePR = isReleasePleaseBranch || isReleasePleaseLabel;
            if (!isReleasePR) {
              core.notice('PR is not a release-please PR. Skipping.');
              core.setOutput('should_enable', 'false');
              return;
            }

            if (pr.draft) {
              core.notice('Release PR is still draft. Skipping merge.');
              core.setOutput('should_enable', 'false');
              return;
            }
            core.setOutput('should_enable', 'true');
            core.setOutput('pull_number', String(pr.number));
            core.notice(`Autopilot is enabled for release PR #${pr.number}. Enabling GitHub auto-merge.`);

      - name: Enable GitHub auto-merge for release PR
        if: steps.evaluate.outputs.should_enable == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.evaluate.outputs.pull_number }}
          merge-method: squash

name: PR Autopilot

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - labeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-autopilot-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-automerge:
    if: github.event.pull_request.state == 'open'
    uses: ./.github/workflows/release-autopilot-reusable.yml
    with:
      ai_autopilot_enabled: ${{ vars.AI_AUTOPILOT_ENABLED || 'false' }}
      release_autopilot_enabled: ${{ vars.RELEASE_AUTOPILOT_ENABLED || 'false' }}
      allowed_author: haryselman
    secrets:
      release_please_token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

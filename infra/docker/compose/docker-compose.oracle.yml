services:
  db:
    image: gvenzl/oracle-xe:21-slim-faststart
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_USER}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    ports:
      - "${ORACLE_HOST_PORT:-1521}:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo \"SET HEADING OFF FEEDBACK OFF PAGESIZE 0 VERIFY OFF ECHO OFF\nSELECT 'EG_HEALTH_OK' FROM dual;\nEXIT\" | sqlplus -s \"${ORACLE_USER}/${ORACLE_PASSWORD}@//127.0.0.1:1521/${ORACLE_SERVICE_NAME:-XEPDB1}\" | grep -q 'EG_HEALTH_OK'"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s

  backend:
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.API_PORT||'8787';require('http').get('http://127.0.0.1:'+p+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 120s

volumes:
  oracle_data:

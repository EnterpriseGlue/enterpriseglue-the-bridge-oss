services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - ${EG_BACKEND_ENV_FILE:-./.local/docker/env/docker.env}
    environment:
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_TYPE: ${EG_FORCE_DATABASE_TYPE:-${DATABASE_TYPE}}
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: >-
      sh -c "set -e; LOCK_HASH=$$(node -e \"const fs=require('fs');const crypto=require('crypto');const a=fs.readFileSync('package.json');const b=fs.readFileSync('package-lock.json');process.stdout.write(crypto.createHash('sha256').update(a).update(b).digest('hex'));\"); STORED_HASH=$$(cat node_modules/.deps-hash 2>/dev/null || true); if [ \"$$LOCK_HASH\" != \"$$STORED_HASH\" ]; then echo \"Backend deps changed; running npm ci...\"; npm ci --include=dev --no-audit --no-fund; echo \"$$LOCK_HASH\" > node_modules/.deps-hash; fi; DB_DRIVER=pg; case \"$${DATABASE_TYPE:-postgres}\" in postgres) DB_DRIVER=pg ;; mysql) DB_DRIVER=mysql2 ;; mssql) DB_DRIVER=mssql ;; oracle) DB_DRIVER=oracledb ;; spanner) DB_DRIVER=@google-cloud/spanner ;; esac; node -e \"require.resolve(process.argv[1]);\" \"$$DB_DRIVER\" >/dev/null 2>&1 || npm install --include=dev --no-audit --no-fund --no-save \"$$DB_DRIVER\"; npm run dev"
    volumes:
      - ./backend:/app
      - ./packages:/packages:ro
      - backend_node_modules:/app/node_modules
      - git_repos:/app/data/repos

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        API_BASE_URL: ${API_BASE_URL:-}
    restart: unless-stopped
    init: true
    environment:
      API_UPSTREAM: backend:${API_PORT:-8787}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:8080"

volumes:
  postgres_data:
  backend_node_modules:
  git_repos:

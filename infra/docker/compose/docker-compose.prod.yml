services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    init: true
    env_file:
      - ${EG_BACKEND_ENV_FILE:-./.local/docker/env/production.env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - git_repos:/app/data/repos
    expose:
      - "${API_PORT:-8787}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.API_PORT||'8787';require('http').get('http://127.0.0.1:'+p+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        API_BASE_URL: ${API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_UPSTREAM: backend:${API_PORT:-8787}
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:8080"

volumes:
  postgres_data:
  git_repos:

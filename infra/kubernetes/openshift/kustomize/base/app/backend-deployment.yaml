apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterpriseglue-backend
  labels:
    app.kubernetes.io/name: enterpriseglue-backend
    app.kubernetes.io/part-of: enterpriseglue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: enterpriseglue-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enterpriseglue-backend
        app.kubernetes.io/part-of: enterpriseglue
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/OWNER/enterpriseglue-the-bridge-oss-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          envFrom:
            - configMapRef:
                name: enterpriseglue-config
            - secretRef:
                name: enterpriseglue-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: git-repos
              mountPath: /app/data/repos
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: git-repos
          persistentVolumeClaim:
            claimName: backend-git-repos

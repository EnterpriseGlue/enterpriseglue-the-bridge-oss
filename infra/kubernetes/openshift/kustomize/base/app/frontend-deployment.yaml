apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterpriseglue-frontend
  labels:
    app.kubernetes.io/name: enterpriseglue-frontend
    app.kubernetes.io/part-of: enterpriseglue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: enterpriseglue-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enterpriseglue-frontend
        app.kubernetes.io/part-of: enterpriseglue
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/OWNER/enterpriseglue-the-bridge-oss-frontend:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: API_UPSTREAM
              value: enterpriseglue-backend:8787
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5

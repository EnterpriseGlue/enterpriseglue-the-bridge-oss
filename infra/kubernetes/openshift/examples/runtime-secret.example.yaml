apiVersion: v1
kind: Secret
metadata:
  name: enterpriseglue-secrets
  labels:
    app.kubernetes.io/name: enterpriseglue
    app.kubernetes.io/part-of: enterpriseglue
type: Opaque
stringData:
  JWT_SECRET: "replace-with-random-secret"
  ADMIN_EMAIL: "admin@enterpriseglue.ai"
  ADMIN_PASSWORD: "replace-with-strong-password"
  ENCRYPTION_KEY: "replace-with-64-hex-characters"

  # Option A: connection string (external/managed DB, e.g. RDS, Azure, Cloud SQL)
  # Leave empty if using Option B individual vars below.
  # Format: postgresql://USER:PASSWORD@HOST:PORT/DATABASE?schema=SCHEMA&sslmode=require
  # Two-host production: point at your pgBouncer/load-balancer service endpoint.
  POSTGRES_URL: ""

  # Option B: individual variables (in-cluster PostgreSQL service)
  POSTGRES_USER: "enterpriseglue"
  POSTGRES_PASSWORD: "replace-postgres-password"

  # Oracle — Option A: multi-host connection string (Easy Connect Plus or TNS descriptor)
  # Use this when connecting to two or more Oracle hosts for HA/failover.
  # Leave empty when using Option B individual vars below.
  #
  # Easy Connect Plus — two hosts with automatic client failover (simplest):
  #   ORACLE_CONNECTION_STRING: "host1.example.com:1521,host2.example.com:1521/MYSERVICE"
  #
  # TNS descriptor — explicit failover + load balancing (recommended for production):
  #   ORACLE_CONNECTION_STRING: "(DESCRIPTION=(FAILOVER=on)(LOAD_BALANCE=on)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=host1.example.com)(PORT=1521))(ADDRESS=(PROTOCOL=TCP)(HOST=host2.example.com)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=MYSERVICE)))"
  ORACLE_CONNECTION_STRING: "host1.example.com:1521,host2.example.com:1521/MYSERVICE"

  # Oracle — Option B: individual variables (single host)
  ORACLE_USER: "enterpriseglue"
  ORACLE_PASSWORD: "replace-oracle-password"
